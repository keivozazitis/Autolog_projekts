[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.dom", "php82Extensions.curl", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]


[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan view:clear && php artisan storage:link 2>/dev/null || true && php artisan migrate --force 2>/dev/null || true && php artisan serve --host=0.0.0.0 --port=80"
